name: campus_connect
description: Campus Connect - A university mobile application.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  package_info_plus: ^9.0.0
  local_auth: ^3.0.1
  # ── Clean Architecture additions ──
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/images/
